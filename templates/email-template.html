<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Reminder</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        .header p {
            margin: 8px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 40px 30px;
            text-align: center;
        }
        .prayer-name {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin: 20px 0 10px 0;
        }
        .prayer-time {
            font-size: 24px;
            color: #333;
            font-weight: 500;
            margin: 20px 0 30px 0;
        }
        .time-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 30px auto;
            border-radius: 2px;
        }
        .message {
            font-size: 16px;
            color: #555;
            margin: 30px 0;
            line-height: 1.8;
        }
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 32px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 500;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .cta-button:hover {
            transform: translateY(-2px);
        }
        .footer {
            background-color: #f9f9f9;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
        }
        .prayer-icon {
            font-size: 48px;
            margin: 0;
        }
        @media (max-width: 600px) {
            .container {
                border-radius: 0;
                box-shadow: none;
            }
            .header {
                padding: 30px 15px;
            }
            .content {
                padding: 30px 20px;
            }
            .prayer-name {
                font-size: 28px;
            }
            .prayer-time {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕌 Prayer Time</h1>
            <p>It's time to pray</p>
        </div>
        
        <div class="content">
            <div class="prayer-icon">🙏</div>
            <div class="prayer-name">{{PRAYER_NAME}}</div>
            <div class="divider"></div>
            
            <div class="time-label">Prayer time</div>
            <div class="prayer-time">{{PRAYER_TIME}}</div>
            
            <div class="message">
                May Allah accept from us. This is a reminder to perform your {{PRAYER_NAME}} prayer on time.
            </div>
            
            <a href="{{ISLAMIC_FINDER_URL}}" class="cta-button">View Prayer Times</a>
        </div>
        
        <div class="footer">
            <p style="margin: 0;">
                © 2026 Prayer Reminder Service. You received this because you subscribed to prayer notifications.
            </p>
        </div>
    </div>
</body>
</html>
